<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Timetable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: #0a0a0f;
  color: #e2e8f0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button {
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
  outline: none;
  border: none;
  background: none;
  font-family: 'Space Mono', monospace;
}
.page-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 16px 80px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header-date {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #4b5563;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: #f1f5f9;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.header-subtitle {
  font-size: 13px;
  color: #6b7280;
  font-weight: 300;
  margin-bottom: 28px;
}

/* PROGRESS */
.progress-section {
  margin-bottom: 40px;
}
.progress-percent {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 4rem;
  background: linear-gradient(90deg, #60a5fa, #22d3ee, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 10px;
}
.progress-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #4b5563;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.progress-bar-track {
  height: 4px;
  background: #1e1e2e;
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #60a5fa, #22d3ee, #a78bfa);
  transition: width 0.5s ease;
  width: 0%;
}
.celebration {
  display: none;
  margin-top: 20px;
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(167,139,250,0.12));
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 12px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  color: #e2e8f0;
}
.celebration.show { display: block; }

/* TIMELINE */
.timeline {
  position: relative;
  padding-left: 32px;
}
.timeline-line {
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #1e1e2e;
  border-radius: 1px;
}

/* CARD */
.card-wrap {
  position: relative;
  margin-bottom: 12px;
}
.card-dot {
  position: absolute;
  left: -28px;
  top: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid #0a0a0f;
  z-index: 2;
}
.dot-gold { background: #f59e0b; }
.dot-cyan { background: #22d3ee; }
.dot-blue { background: #60a5fa; }
.dot-purple { background: #7c3aed; }
.dot-green { background: #34d399; }
.dot-pink { background: #f472b6; }
.dot-orange { background: #fb923c; }
.dot-grey { background: #6b7280; }
.dot-yellow { background: #fde68a; }

.card {
  background: #111118;
  border: 1px solid #1e1e2e;
  border-radius: 12px;
  padding: 14px 16px;
  transition: opacity 0.3s ease;
  position: relative;
}
.card.non-clickable {
  border-style: dashed;
  opacity: 0.5;
}
.card.done-posted {
  background: rgba(52,211,153,0.06);
  border-color: rgba(52,211,153,0.25);
}
.card.done-posted .card-name {
  text-decoration: line-through;
  opacity: 0.6;
}
.card.done-fixed {
  border-color: rgba(52,211,153,0.3);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.card-time {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #4b5563;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 99px;
  white-space: nowrap;
}
.badge-gold { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-cyan { background: rgba(34,211,238,0.15); color: #22d3ee; }
.badge-blue { background: rgba(96,165,250,0.15); color: #60a5fa; }
.badge-purple { background: rgba(124,58,237,0.15); color: #a78bfa; }
.badge-green { background: rgba(52,211,153,0.15); color: #34d399; }
.badge-pink { background: rgba(244,114,182,0.15); color: #f472b6; }
.badge-orange { background: rgba(251,146,60,0.15); color: #fb923c; }
.badge-grey { background: rgba(107,114,128,0.15); color: #9ca3af; }
.badge-yellow { background: rgba(253,230,138,0.15); color: #fde68a; }
.badge-rescheduled { background: rgba(245,158,11,0.18); color: #fbbf24; }

.card-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: #f1f5f9;
  margin-bottom: 3px;
}
.card-desc {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: #6b7280;
  font-weight: 300;
  line-height: 1.5;
}
.card-note {
  margin-top: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #4b5563;
  letter-spacing: 0.06em;
}
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-posted {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid rgba(52,211,153,0.4);
  background: rgba(52,211,153,0.06);
  color: #34d399;
  border-radius: 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.btn-skipped {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid rgba(248,113,113,0.35);
  background: rgba(248,113,113,0.06);
  color: #f87171;
  border-radius: 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.btn-undo {
  width: 100%;
  margin-top: 8px;
  padding: 7px 10px;
  border: 1px solid #1e1e2e;
  background: transparent;
  color: #4b5563;
  border-radius: 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: none;
}
.btn-undo.show { display: block; }
.tick-icon {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(52,211,153,0.15);
  border: 1px solid rgba(52,211,153,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}
.tick-icon.show { display: flex; }
.tick-icon svg { width: 10px; height: 10px; }

/* TIPS */
.tips-section {
  margin-top: 56px;
}
.tips-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  color: #f1f5f9;
  margin-bottom: 16px;
}
.tips-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.tip-card {
  background: #111118;
  border: 1px solid #1e1e2e;
  border-radius: 10px;
  padding: 12px 14px;
}
.tip-num {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #4b5563;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.tip-text {
  font-size: 12px;
  color: #9ca3af;
  font-weight: 300;
  line-height: 1.5;
}

@media (max-width: 500px) {
  .tips-grid { grid-template-columns: 1fr; }
  .timeline { padding-left: 26px; }
  .card-dot { left: -23px; width: 8px; height: 8px; }
  .timeline-line { left: 6px; }
  .progress-percent { font-size: 3rem; }
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="header-date" id="headerDate"></div>
    <div class="header-title">Daily Ops</div>
    <div class="header-subtitle">Your full schedule for today</div>
  </div>

  <div class="progress-section">
    <div class="progress-percent" id="progressPct">0%</div>
    <div class="progress-label">Tasks completed today</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="celebration" id="celebration">All done. You ran the whole day. That compounds.</div>
  </div>

  <div class="timeline">
    <div class="timeline-line"></div>
    <div id="timelineItems"></div>
  </div>

  <div class="tips-section">
    <div class="tips-title">Pro Tips</div>
    <div class="tips-grid" id="tipsGrid"></div>
  </div>
</div>

<script>
(function() {
  try {

    /* ── UTILS ── */
    function mulberry32(seed) {
      return function() {
        seed = seed + 0x6D2B79F5 | 0;
        var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function seededShuffle(arr, rng) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(rng() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function todayKey() {
      var d = new Date();
      return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
    }

    function dateSeed() {
      var d = new Date();
      return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    }

    function minsToTime(m) {
      var h = Math.floor(m / 60) % 24;
      var min = m % 60;
      var ampm = h >= 12 ? 'PM' : 'AM';
      var h12 = h % 12; if (h12 === 0) h12 = 12;
      return h12 + ':' + (min < 10 ? '0' : '') + min + ' ' + ampm;
    }

    function nowMins() {
      var d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }

    function isForbidden(m) {
      return (m >= 720 && m <= 780) || (m >= 1020 && m <= 1085);
    }

    /* ── STORAGE CLEANUP ── */
    var STORAGE_KEY = 'timetable_v4_' + todayKey();
    (function cleanOldKeys() {
      var toRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('timetable_') === 0 && k !== STORAGE_KEY) {
          toRemove.push(k);
        }
      }
      for (var j = 0; j < toRemove.length; j++) { localStorage.removeItem(toRemove[j]); }
    })();

    /* ── STATE ── */
    var state;
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      state = raw ? JSON.parse(raw) : null;
    } catch(e) { state = null; }
    if (!state) {
      state = { posted: {}, skipped: {}, fixedDone: {}, rescheduled: [] };
    }
    if (!state.rescheduled) state.rescheduled = [];

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
    }

    /* ── GROWTH UNLOCK ── */
    var START_DATE = new Date(2026, 5, 1); // June 1 2026
    var UNLOCK_DATE = new Date(2026, 6, 1); // July 1 2026
    var TODAY = new Date();
    var unlocked = TODAY >= UNLOCK_DATE;

    /* ── RNG SETUP ── */
    var rng = mulberry32(dateSeed());

    /* ── GM POST TIME ── */
    var gmMins = 330 + Math.floor(rng() * 46); // 330–375

    /* ── SHUFFLED POSTS DEFINITION ── */
    var web3Posts = [
      { name: 'Web3 Content #1', desc: 'Post your first Web3 content of the day. Rankings, alpha, or a hot take.', badge: 'Web3', badgeClass: 'badge-cyan', dotClass: 'dot-cyan' },
      { name: 'Web3 Content #2', desc: 'Second Web3 post. Engage the timeline with a bold claim or insight.', badge: 'Web3', badgeClass: 'badge-cyan', dotClass: 'dot-cyan' },
      { name: 'Web3 Content #3', desc: 'Third Web3 post. Comparison, prediction, or 4-things format.', badge: 'Web3', badgeClass: 'badge-cyan', dotClass: 'dot-cyan' },
      { name: 'Web3 Content #4', desc: 'Fourth Web3 post. Make this one shareable — rankings or a spicy take.', badge: 'Web3', badgeClass: 'badge-cyan', dotClass: 'dot-cyan' }
    ];
    var web2Posts = [
      { name: 'Web2 Content #1', desc: 'First Web2 post. Clip, hook, or broader audience content.', badge: 'Web2', badgeClass: 'badge-blue', dotClass: 'dot-blue' },
      { name: 'Web2 Content #2', desc: 'Second Web2 post. Engage beyond the CT bubble.', badge: 'Web2', badgeClass: 'badge-blue', dotClass: 'dot-blue' },
      { name: 'Web2 Content #3', desc: 'Third Web2 post. Broad hook, viral format, or commentary.', badge: 'Web2', badgeClass: 'badge-blue', dotClass: 'dot-blue' }
    ];

    // Repost influencer picks
    var rpostRng1 = rng();
    var rpostRng2 = rng();
    var rpost1Name = rpostRng1 < 0.5 ? '@starplatinum' : '@web3righteous';
    var rpost2Name = rpostRng2 < 0.5 ? '@web3nigeria' : '@ola_crrypt';
    var repostPosts = [
      { name: 'Repost — ' + rpost1Name, desc: 'Find a top post from ' + rpost1Name + ' and repost with your own comment.', badge: 'Repost', badgeClass: 'badge-purple', dotClass: 'dot-purple' },
      { name: 'Repost — ' + rpost2Name, desc: 'Find a top post from ' + rpost2Name + ' and repost with your own comment.', badge: 'Repost', badgeClass: 'badge-purple', dotClass: 'dot-purple' }
    ];

    var allShuffled9 = web3Posts.concat(web2Posts).concat(repostPosts);
    var shuffled9 = seededShuffle(allShuffled9, rng);

    /* ── TIME SLOT GENERATION ── */
    // Slots: 3 before noon, 5 afternoon, 1 evening
    // morning: gmMins+120 to gmMins+150 for first, then min 40 gaps until 710
    // afternoon: 785 to 1015, min 40 gaps
    // evening: 1085 to 1130

    var slots = [];

    // Morning: first must be 120–150 after GM, then +40 each
    var morningMin = gmMins + 120;
    var morningMax = gmMins + 150;
    // Pick first morning slot
    var m1 = morningMin + Math.floor(rng() * (morningMax - morningMin + 1));
    slots.push(m1);
    // Two more before noon (window closes 710)
    var lastM = m1;
    for (var i = 0; i < 2; i++) {
      var earliest = lastM + 40;
      var latest = 710 - 40 * (1 - i);
      if (earliest > latest) { earliest = latest; }
      var slotM = earliest + Math.floor(rng() * Math.max(1, latest - earliest + 1));
      if (slotM > 710) slotM = 710;
      slots.push(slotM);
      lastM = slotM;
    }

    // Afternoon: 5 slots between 785 and 1015, min 40 gap
    var afStart = 785;
    var afEnd = 1015;
    var lastAf = afStart - 40;
    for (var j = 0; j < 5; j++) {
      var afEarliest = lastAf + 40;
      var afLatest = afEnd - 40 * (4 - j);
      if (afEarliest > afLatest) { afEarliest = afLatest; }
      var afSlot = afEarliest + Math.floor(rng() * Math.max(1, afLatest - afEarliest + 1));
      if (afSlot > afEnd) afSlot = afEnd;
      slots.push(afSlot);
      lastAf = afSlot;
    }

    // Evening: 1 slot 1085–1130
    var evSlot = 1085 + Math.floor(rng() * 46);
    slots.push(evSlot);

    // Assign shuffled posts to slots
    var dynamicItems = [];
    for (var k = 0; k < 9; k++) {
      var post = shuffled9[k];
      var id = 'dyn_' + k;
      dynamicItems.push({
        id: id,
        sortMins: slots[k],
        timeLabel: minsToTime(slots[k]),
        name: post.name,
        desc: post.desc,
        badge: post.badge,
        badgeClass: post.badgeClass,
        dotClass: post.dotClass,
        dynamic: true
      });
    }

    // Growth unlock 10th post
    if (unlocked) {
      var extraRng = mulberry32(dateSeed() + 1);
      var extraAfSlots = [];
      for (var ex = 0; ex < 5; ex++) {
        var taken = slots[3 + ex]; // afternoon slots
        extraAfSlots.push(taken);
      }
      // Find a gap in afternoon for extra post
      var extraTime = 785;
      for (var af2 = 0; af2 < extraAfSlots.length; af2++) {
        if (extraAfSlots[af2] - extraTime >= 40) break;
        extraTime = extraAfSlots[af2] + 40;
      }
      if (extraTime > 1015) extraTime = 820;
      dynamicItems.push({
        id: 'dyn_unlock',
        sortMins: extraTime,
        timeLabel: minsToTime(extraTime),
        name: 'Web3 Content — Bonus',
        desc: 'Milestone post. Unlocked after 30 days of consistency. Make it count.',
        badge: 'Web3',
        badgeClass: 'badge-cyan',
        dotClass: 'dot-cyan',
        dynamic: true,
        unlockNote: true
      });
    }

    /* ── FIXED ITEMS ── */
    var fixedItems = [
      { id: 'wake', sortMins: 330, timeLabel: '5:30 AM', name: 'Wake Up', desc: 'Freshen up, breakfast, hydrate. Set yourself up.', badge: 'Morning', badgeClass: 'badge-grey', dotClass: 'dot-grey', clickable: false },
      { id: 'review', sortMins: 340, timeLabel: '5:40 AM', name: 'Review Yesterday', desc: 'Check engagement from yesterday. Note what performed well.', badge: 'Review', badgeClass: 'badge-grey', dotClass: 'dot-grey', clickable: false },
      { id: 'gm', sortMins: gmMins, timeLabel: minsToTime(gmMins), name: 'GM Post', desc: 'Drop your GM. First impression of the day — make it warm.', badge: 'GM', badgeClass: 'badge-gold', dotClass: 'dot-gold', dynamic: true },
      { id: 'break', sortMins: 720, timeLabel: '12:00–1:00 PM', name: 'Afternoon Break', desc: 'Step away. Eat, rest, reset. One hour — no phone.', badge: 'Break', badgeClass: 'badge-green', dotClass: 'dot-green', clickable: false },
      { id: 'rest', sortMins: 1020, timeLabel: '5:00–6:00 PM', name: 'Rest and Recharge', desc: 'Step away. Walk, eat, or do nothing. Protect your energy.', badge: 'Rest', badgeClass: 'badge-green', dotClass: 'dot-green', clickable: true, fixed: true },
      { id: 'replies', sortMins: 1140, timeLabel: '7:00 PM', name: '500 Replies Done', desc: 'End of posting day. All reply targets hit. Mark and move on.', badge: 'Milestone', badgeClass: 'badge-pink', dotClass: 'dot-pink', clickable: true, fixed: true },
      { id: 'hostspace', sortMins: 1141, timeLabel: '7:00–8:00 PM', name: 'Host Your Space', desc: 'Run your Twitter Space. Engage, bring guests, build community.', badge: 'Space', badgeClass: 'badge-cyan', dotClass: 'dot-cyan', clickable: true, fixed: true },
      { id: 'joinspace', sortMins: 1200, timeLabel: '8:00–9:00 PM', name: 'Join Other Spaces', desc: 'Drop into active Spaces. Contribute, network, get known.', badge: 'Space', badgeClass: 'badge-cyan', dotClass: 'dot-cyan', clickable: true, fixed: true },
      { id: 'clipping', sortMins: 1260, timeLabel: '9:00–10:30 PM', name: 'Clipping Videos', desc: 'Record and edit your clips for tomorrow\'s posts. Batch it.', badge: 'Content', badgeClass: 'badge-orange', dotClass: 'dot-orange', clickable: true, fixed: true },
      { id: 'discord', sortMins: 1350, timeLabel: '10:30–11:00 PM', name: 'Discord Outreach', desc: 'Send 50 DMs across Discord servers. Build connections intentionally.', badge: 'Outreach', badgeClass: 'badge-purple', dotClass: 'dot-purple', clickable: true, fixed: true },
      { id: 'draft', sortMins: 1380, timeLabel: '11:00–11:30 PM', name: 'Draft Tomorrow\'s Posts', desc: 'Write your post queue for tomorrow. Sleep knowing it\'s ready.', badge: 'Planning', badgeClass: 'badge-grey', dotClass: 'dot-grey', clickable: true, fixed: true },
      { id: 'sleep', sortMins: 1440, timeLabel: '12:00 AM', name: 'Sleep', desc: '6 hours 30 minutes. 12:00 AM to 5:30 AM. Non-negotiable.', badge: 'Sleep', badgeClass: 'badge-yellow', dotClass: 'dot-yellow', clickable: false }
    ];

   /* ── RESCHEDULE LOGIC ── */
    function getAllDynTimes(excludeId) {
      var times = [];
      var allDyn = dynamicItems.concat(state.rescheduled || []);
      for (var i = 0; i < allDyn.length; i++) {
        if (allDyn[i].id !== excludeId && !state.skipped[allDyn[i].id]) {
          times.push(allDyn[i].sortMins);
        }
      }
      return times;
    }

    function findRescheduleTime(postId, originalMins) {
      var now = nowMins();
      var earliest = Math.max(now + 5, originalMins + 40);
      var existingTimes = getAllDynTimes(postId);

      function isClear(t) {
        if (isForbidden(t)) return false;
        for (var i = 0; i < existingTimes.length; i++) {
          if (Math.abs(existingTimes[i] - t) < 40) return false;
        }
        return true;
      }

      var windows = [
        [earliest, 710],
        [785, 1015],
        [1085, 1130]
      ];

      for (var w = 0; w < windows.length; w++) {
        var lo = Math.max(windows[w][0], earliest);
        var hi = windows[w][1];
        if (lo > hi) continue;
        for (var attempt = 0; attempt < 30; attempt++) {
          var t = lo + Math.floor(Math.random() * (hi - lo + 1));
          if (isClear(t)) return t;
        }
        // fallback: earliest+45 in this window
        var fb = lo + 45;
        if (fb <= hi) return fb;
      }
      // ultimate fallback
      return Math.min(earliest + 45, 1130);
    }

    /* ── ALL ITEMS (merge + sort) ── */
    function buildAllItems() {
      var all = fixedItems.slice();
      for (var i = 0; i < dynamicItems.length; i++) { all.push(dynamicItems[i]); }
      for (var r = 0; r < state.rescheduled.length; r++) { all.push(state.rescheduled[r]); }
      all.sort(function(a, b) { return a.sortMins - b.sortMins; });
      return all;
    }

    /* ── PROGRESS CALCULATION ── */
    function calcProgress() {
      var total = 0;
      var done = 0;
      // dynamic posts (not skipped, not children of non-undo)
      for (var i = 0; i < dynamicItems.length; i++) {
        var id = dynamicItems[i].id;
        if (state.skipped[id]) continue; // skipped don't count
        total++;
        if (state.posted[id]) done++;
      }
      // rescheduled posts
      for (var r = 0; r < state.rescheduled.length; r++) {
        var rid = state.rescheduled[r].id;
        total++;
        if (state.posted[rid]) done++;
      }
      // fixed clickable
      var fixedClickable = ['rest', 'replies', 'hostspace', 'joinspace', 'clipping', 'discord', 'draft'];
      for (var f = 0; f < fixedClickable.length; f++) {
        total++;
        if (state.fixedDone[fixedClickable[f]]) done++;
      }
      return { total: total, done: done };
    }

    function updateProgress() {
      var p = calcProgress();
      var pct = p.total === 0 ? 0 : Math.round((p.done / p.total) * 100);
      document.getElementById('progressPct').innerHTML = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
      var cel = document.getElementById('celebration');
      if (pct === 100) {
        cel.className = 'celebration show';
      } else {
        cel.className = 'celebration';
      }
    }

    /* ── RENDER ── */
    function render() {
      var container = document.getElementById('timelineItems');
      container.innerHTML = '';
      var all = buildAllItems();

      for (var i = 0; i < all.length; i++) {
        var item = all[i];
        var id = item.id;

        // Determine card type
        var isDynamic = item.dynamic;
        var isFixed = item.fixed;
        var isNonClickable = item.clickable === false && !isDynamic;
        var isSkipped = state.skipped[id];
        var isPosted = state.posted[id];
        var isFixedDone = state.fixedDone[id];
        var isRescheduled = item.rescheduled;

        // Skip rendering if skipped (unless it's a rescheduled child)
        if (isSkipped && !isRescheduled) continue;

        var wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.setAttribute('data-id', id);

        // Dot
        var dot = document.createElement('div');
        dot.className = 'card-dot ' + item.dotClass;
        wrap.appendChild(dot);

        // Card
        var card = document.createElement('div');
        var cardClasses = 'card';
        if (isNonClickable) cardClasses += ' non-clickable';
        if (isPosted) cardClasses += ' done-posted';
        if (isFixedDone) cardClasses += ' done-fixed';
        card.className = cardClasses;
        card.setAttribute('data-id', id);

        // Tick for fixed clickable
        if (isFixed) {
          var tick = document.createElement('div');
          tick.className = 'tick-icon' + (isFixedDone ? ' show' : '');
          tick.innerHTML = '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6l3 3 5-5" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          card.appendChild(tick);
        }

        // Header row
        var hdr = document.createElement('div');
        hdr.className = 'card-header';

        var timeEl = document.createElement('span');
        timeEl.className = 'card-time';
        timeEl.innerHTML = item.timeLabel;
        hdr.appendChild(timeEl);

        var badgeEl = document.createElement('span');
        badgeEl.className = 'badge ' + item.badgeClass;
        badgeEl.innerHTML = item.badge;
        hdr.appendChild(badgeEl);

        if (isRescheduled) {
          var rTag = document.createElement('span');
          rTag.className = 'badge badge-rescheduled';
          rTag.innerHTML = 'Rescheduled';
          hdr.appendChild(rTag);
        }
        if (item.unlockNote) {
          var uTag = document.createElement('span');
          uTag.className = 'badge badge-gold';
          uTag.innerHTML = 'Milestone';
          hdr.appendChild(uTag);
        }

        card.appendChild(hdr);

        var nameEl = document.createElement('div');
        nameEl.className = 'card-name';
        nameEl.innerHTML = item.name;
        card.appendChild(nameEl);

        var descEl = document.createElement('div');
        descEl.className = 'card-desc';
        descEl.innerHTML = item.desc;
        card.appendChild(descEl);

        if (item.unlockNote) {
          var noteEl = document.createElement('div');
          noteEl.className = 'card-note';
          noteEl.innerHTML = 'Unlocked — 30 day milestone';
          card.appendChild(noteEl);
        }

        // Dynamic post buttons
        if (isDynamic && id !== 'gm') {
          if (!isPosted) {
            var actions = document.createElement('div');
            actions.className = 'card-actions';

            var btnPosted = document.createElement('button');
            btnPosted.className = 'btn-posted';
            btnPosted.innerHTML = 'Posted';
            btnPosted.setAttribute('data-id', id);
            btnPosted.setAttribute('data-action', 'post');
            actions.appendChild(btnPosted);

            var btnSkipped = document.createElement('button');
            btnSkipped.className = 'btn-skipped';
            btnSkipped.innerHTML = 'Skip';
            btnSkipped.setAttribute('data-id', id);
            btnSkipped.setAttribute('data-action', 'skip');
            actions.appendChild(btnSkipped);

            card.appendChild(actions);
          }

          if (isPosted) {
            var undoPost = document.createElement('button');
            undoPost.className = 'btn-undo show';
            undoPost.innerHTML = 'Undo Posted';
            undoPost.setAttribute('data-id', id);
            undoPost.setAttribute('data-action', 'undo-post');
            card.appendChild(undoPost);
          }
        }

        // GM post: simple posted toggle
        if (id === 'gm') {
          if (!isPosted) {
            var gmActions = document.createElement('div');
            gmActions.className = 'card-actions';
            var gmBtn = document.createElement('button');
            gmBtn.className = 'btn-posted';
            gmBtn.innerHTML = 'Posted';
            gmBtn.style.flex = '1';
            gmBtn.setAttribute('data-id', 'gm');
            gmBtn.setAttribute('data-action', 'post');
            gmActions.appendChild(gmBtn);
            card.appendChild(gmActions);
          } else {
            var gmUndo = document.createElement('button');
            gmUndo.className = 'btn-undo show';
            gmUndo.innerHTML = 'Undo Posted';
            gmUndo.setAttribute('data-id', 'gm');
            gmUndo.setAttribute('data-action', 'undo-post');
            card.appendChild(gmUndo);
          }
        }

        wrap.appendChild(card);
        container.appendChild(wrap);
      }

      // Bind events
      bindEvents();
      updateProgress();
    }

    function bindEvents() {
      var container = document.getElementById('timelineItems');

      // Dynamic buttons
      var btns = container.querySelectorAll('button[data-action]');
      for (var i = 0; i < btns.length; i++) {
        (function(btn) {
          btn.onclick = function() {
            var id = btn.getAttribute('data-id');
            var action = btn.getAttribute('data-action');
            handleAction(id, action);
          };
        })(btns[i]);
      }

      // Fixed clickable cards (tap anywhere)
      var cards = container.querySelectorAll('.card[data-id]');
      for (var j = 0; j < cards.length; j++) {
        (function(card) {
          var cid = card.getAttribute('data-id');
          var fixedClickable = { rest:1, replies:1, hostspace:1, joinspace:1, clipping:1, discord:1, draft:1 };
          if (fixedClickable[cid]) {
            card.style.cursor = 'pointer';
            card.onclick = function() {
              state.fixedDone[cid] = !state.fixedDone[cid];
              saveState();
              render();
            };
          }
        })(cards[j]);
      }
    }

    function findDynItem(id) {
      for (var i = 0; i < dynamicItems.length; i++) {
        if (dynamicItems[i].id === id) return dynamicItems[i];
      }
      for (var r = 0; r < state.rescheduled.length; r++) {
        if (state.rescheduled[r].id === id) return state.rescheduled[r];
      }
      return null;
    }

    function handleAction(id, action) {
      var item = findDynItem(id);
      if (!item) return;

      if (action === 'post') {
        state.posted[id] = true;
        delete state.skipped[id];
        saveState();
        render();
      } else if (action === 'undo-post') {
        delete state.posted[id];
        saveState();
        render();
      } else if (action === 'skip') {
        state.skipped[id] = true;
        // Generate rescheduled version
        var newTime = findRescheduleTime(id, item.sortMins);
        var reschedId = 'rsch_' + id + '_' + newTime;
        var reschedItem = {
          id: reschedId,
          parentId: id,
          sortMins: newTime,
          timeLabel: minsToTime(newTime),
          name: item.name,
          desc: item.desc,
          badge: item.badge,
          badgeClass: item.badgeClass,
          dotClass: item.dotClass,
          dynamic: true,
          rescheduled: true
        };
        state.rescheduled.push(reschedItem);
        saveState();
        render();
      } else if (action === 'undo-skip') {
        // remove rescheduled children
        var newRsch = [];
        for (var r = 0; r < state.rescheduled.length; r++) {
          if (state.rescheduled[r].parentId !== id) {
            newRsch.push(state.rescheduled[r]);
          }
        }
        state.rescheduled = newRsch;
        delete state.skipped[id];
        saveState();
        render();
      }
    }

    /* ── HEADER DATE ── */
    function renderDate() {
      var d = new Date();
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var str = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      document.getElementById('headerDate').innerHTML = str;
    }

    /* ── TIPS ── */
    function renderTips() {
      var tips = [
        'GM post early between 5:30–6:15 AM sets the tone while your audience is just waking up.',
        'Spread your 9 posts across the day — front-load before noon then pace through the afternoon and evening.',
        '12–1 PM break is sacred. Step away, eat, reset. You post better with a clear head.',
        'Hit Skip if you miss a slot — it auto-reschedules so you never fall behind on your 10 posts.',
        'Clipping time 9–10:30 PM — batch your clips while the day is fresh. Consistency compounds.',
        'Draft tomorrow\'s posts at 11 PM while today is fresh. Sleep knowing the queue is ready.'
      ];
      var grid = document.getElementById('tipsGrid');
      grid.innerHTML = '';
      for (var i = 0; i < tips.length; i++) {
        var tc = document.createElement('div');
        tc.className = 'tip-card';
        var tn = document.createElement('div');
        tn.className = 'tip-num';
        tn.innerHTML = '0' + (i+1);
        var tt = document.createElement('div');
        tt.className = 'tip-text';
        tt.innerHTML = tips[i];
        tc.appendChild(tn);
        tc.appendChild(tt);
        grid.appendChild(tc);
      }
    }

    /* ── INIT ── */
    renderDate();
    renderTips();
    render();

    // Refresh every minute to keep progress accurate
    setInterval(function() { updateProgress(); }, 60000);

  } catch(e) {
    document.body.innerHTML = '<div style="color:#f87171;font-family:monospace;padding:32px;">Error: ' + e.message + '</div>';
  }
})();
</script>
